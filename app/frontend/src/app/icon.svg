<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Three-tier architecture: 3 stacked layers -->
  <!-- Bottom layer (Data Tier) - blue -->
  <path d="M4 22l12 6 12-6" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Middle layer (App Tier) - orange -->
  <path d="M4 16l12 6 12-6" fill="none" stroke="#ff6b35" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Top layer (Web Tier) - orange-red -->
  <path d="M4 10l12 6 12-6L16 4z" fill="#ff6b35" stroke="#ff6b35" stroke-width="2" stroke-linejoin="round" opacity="0.9"/>
</svg>
